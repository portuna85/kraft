name: CD - Deploy to Production

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean bootJar -x test

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Blue-Green Deploy via SSH
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SERVER_PORT }}
        script: |
          set -e
          cd /app/kraft
          echo "Pulling latest image..."
          docker compose -f docker-compose.prod.yml pull app_a app_b nginx || docker-compose -f docker-compose.prod.yml pull app_a app_b nginx

          echo "Determining active container..."
          ACTIVE="$(docker ps --filter name=kraft-app-a --filter status=running -q)"
          if [ -n "$ACTIVE" ]; then
            ACTIVE_NAME="kraft-app-a"
            IDLE_NAME="kraft-app-b"
          else
            ACTIVE_NAME="kraft-app-b"
            IDLE_NAME="kraft-app-a"
          fi
          echo "Active: $ACTIVE_NAME, Idle target: $IDLE_NAME"

          echo "Starting idle container with new image..."
          docker compose -f docker-compose.prod.yml up -d $IDLE_NAME || docker-compose -f docker-compose.prod.yml up -d $IDLE_NAME

          echo "Waiting for health of $IDLE_NAME ..."
          for i in $(seq 1 20); do
             STATUS=$(docker inspect --format='{{json .State.Health.Status}}' $IDLE_NAME | tr -d '"')
             if [ "$STATUS" = "healthy" ]; then
               echo "$IDLE_NAME is healthy"
               break
             fi
             echo "Health check attempt $i: status=$STATUS"
             sleep 5
          done
          STATUS=$(docker inspect --format='{{json .State.Health.Status}}' $IDLE_NAME | tr -d '"')
          if [ "$STATUS" != "healthy" ]; then
             echo "New container failed health checks. Rolling back." && exit 1
          fi

          echo "New version healthy. Nginx already load balances both. Optionally drain old container $ACTIVE_NAME."
          echo "Draining old container by removing from upstream not implemented (requires dynamic reload). Proceed to stop old container."

          docker stop $ACTIVE_NAME || true
          docker rm $ACTIVE_NAME || true

          echo "Deployment complete: Active now $IDLE_NAME"

          echo "Perform final health verification via Nginx /healthz"
          curl -f http://localhost:8080/healthz || (echo "Final health check failed" && exit 1)

          echo "✅ Zero-downtime deployment succeeded"
