# CI - Build and Test
name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Show Gradle and Java version
        run: ./gradlew --version

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Clean & Build (skip tests first for dependency warm-up)
        run: ./gradlew clean build -x test

      - name: Run tests
        run: ./gradlew test

      - name: Publish JUnit report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload test reports (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test
          retention-days: 7

      - name: Upload build artifacts (JARs)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kraft-jars
          path: build/libs/*.jar
          retention-days: 7

      # - name: Generate coverage report (JaCoCo)
      #   if: success()
      #   run: ./gradlew jacocoTestReport
      #
      # - name: Upload coverage report
      #   if: success()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-report
      #     path: build/reports/jacoco/test/html
      #     retention-days: 7

      - name: Dependency vulnerability check (optional)
        if: success()
        run: |
          ./gradlew dependencies --configuration runtimeClasspath | head -n 50
