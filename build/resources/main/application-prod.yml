spring:
  datasource:
    url: jdbc:mysql://localhost:3306/kraft?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: kraft
    password: kraft1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update          # 처음 스키마 만들 때만 create 사용 후 update로 변경
    properties:
      hibernate:
        format_sql: true

  thymeleaf:
    cache: true
  h2:
    console:
      enabled: false

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.orm.jdbc.bind: off

app:
  upload:
    dir: uploads
