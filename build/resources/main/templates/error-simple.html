<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
  <th:block th:fragment="title">오류</th:block>

  <th:block th:fragment="content">
    <h1>문제가 발생했습니다.</h1>
    <p th:text="${message != null ? message : '잠시 후 다시 시도해 주세요.'}">에러 메시지</p>
    <p><a class="btn" th:href="@{/}">홈으로</a></p>
  </th:block>
</th:block>
</html>
