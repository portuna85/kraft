<th:block th:replace="~{layout/header :: common_header}"></th:block>

<h1>스프링부트로 시작하는 웹 서비스 Ver.2</h1>
<div class="col-md-12">
    <div class="row">
        <div class="col-md-6">
            <a href="/posts/save" role="button" class="btn btn-primary">글 등록</a>
            <th:block th:if="${userName}">
                Logged in as: <span id="user"><span th:text="${userName}"></span></span>
                <a href="/logout" class="btn btn-info active" role="button">Logout</a>
            </th:block>
            <th:block th:if="${#strings.isEmpty(userName)}">
                <a href="/oauth2/authorization/google" class="btn btn-success active" role="button">Google Login</a>
                <a href="/oauth2/authorization/naver" class="btn btn-secondary active" role="button">Naver Login</a>
            </th:block>
        </div>
    </div>
    <br>
    <!-- 목록 출력 영역 -->
    <table class="table table-horizontal table-bordered">
        <thead class="thead-strong">
        <tr>
            <th>게시글번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>최종수정일</th>
        </tr>
        </thead>
        <tbody id="tbody">
        <th:block th:each="item : ${posts}">
            <tr>
                <td th:text=${item.id}></td>
                <td><a th:href="@{'/posts/update/' + ${item.id}}"><span th:text="${item.title}"></span></a></td>
                <td th:text=${item.author}></td>
                <td th:text=${item.modifiedDate}></td>
            </tr>
        </th:block>
        </tbody>
    </table>
</div>

<th:block th:replace="~{layout/footer :: common_footer}"></th:block>
