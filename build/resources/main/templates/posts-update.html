<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/header :: common_header}"></th:block>
<body>
<div class="container mt-4" th:with="p=${post}">
    <h2>글 수정</h2>
    <input id="id" type="hidden" th:value="${p.id}"/>

    <div class="form-group">
        <label>제목</label>
        <input id="title" class="form-control" type="text" th:value="${p.title}"/>
    </div>
    <div class="form-group">
        <label>내용</label>
        <textarea id="content" class="form-control" rows="6" th:text="${p.content}"></textarea>
    </div>

    <button id="btn-update" class="btn btn-primary">수정</button>
    <button id="btn-delete" class="btn btn-danger">삭제</button>
    <a th:href="@{/}" class="btn btn-outline-secondary">목록</a>
</div>
<th:block th:replace="~{layout/footer :: common_footer}"></th:block>
</body>
</html>
