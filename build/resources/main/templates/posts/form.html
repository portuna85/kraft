<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko" th:with="isEdit=${id != null}">
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
    <th:block th:fragment="title" th:text="${isEdit} ? '게시글 수정' : '게시글 작성'">게시글</th:block>

    <th:block th:fragment="content">
        <h1 th:text="${isEdit} ? '게시글 수정' : '게시글 작성'">게시글</h1>

        <div class="errors" th:if="${#fields.hasAnyErrors()}">
            <div th:each="e : ${#fields.detailedErrors('*')}" th:text="${e.message}">오류</div>
        </div>

        <form th:action="${isEdit} ? @{|/posts/${id}/edit|} : @{/posts}"
              method="post" th:object="${form}" enctype="multipart/form-data">
            <input type="hidden" name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div style="margin-bottom:8px">
                <label>제목</label>
                <input th:field="*{title}" placeholder="제목">
                <div class="errors" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">제목 오류</div>
            </div>
            <div style="margin-bottom:8px">
                <label>내용</label>
                <textarea th:field="*{content}" placeholder="내용"></textarea>
                <div class="errors" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">내용 오류</div>
            </div>

            <div style="margin-bottom:8px">
                <label>첨부 파일</label>
                <input type="file" name="files" multiple>
                <div class="muted">이미지(jpg/jpeg/png/gif/webp), 10MB 이하</div>
            </div>

            <div>
                <button type="submit" class="btn btn-primary" th:text="${isEdit} ? '수정' : '등록'">등록</button>
                <a class="btn" th:href="@{/posts}">목록</a>
            </div>
        </form>
    </th:block>
</th:block>
</html>
