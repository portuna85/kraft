<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
      th:fragment="layout (title, content, extraHead, extraScripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title th:replace="${title}">Kraft</title>

    <!-- Bootstrap (CDN 또는 WebJars 중 하나 선택) -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">

    <!-- 프로젝트 공통 스타일(있다면) -->
    <link th:href="@{/css/custom.css}" rel="stylesheet">

    <!-- 페이지별 추가 head -->
    <th:block th:replace="${extraHead}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/header :: header}"></th:block>

<main class="container py-4">
    <th:block th:replace="${content}"></th:block>
</main>

<th:block th:replace="~{fragments/footer :: footer}"></th:block>

<script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

<!-- 페이지별 추가 스크립트 -->
<th:block th:replace="${extraScripts}"></th:block>
</body>
</html>
