<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/header :: common_header}"></th:block>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h2>게시글 목록</h2>
        <div>
            <th:block th:if="${userName}">
                <span th:text="${userName}">사용자</span>
                <a href="/logout" class="btn btn-info">Logout</a>
            </th:block>
            <th:block th:if="${#strings.isEmpty(userName)}">
                <a href="/oauth2/authorization/google" class="btn btn-success">Google Login</a>
                <a href="/oauth2/authorization/naver" class="btn btn-secondary">Naver Login</a>
            </th:block>
        </div>
    </div>

    <div class="text-right my-3">
        <a class="btn btn-primary" th:href="@{/posts/save}">글 등록</a>
    </div>

    <table class="table table-bordered">
        <thead class="thead-strong">
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>작성자</th>
            <th>수정일</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${posts}">
            <td th:text="${p.id}">1</td>
            <td>
                <a th:href="@{/posts/update/{id}(id=${p.id})}" th:text="${p.title}">제목</a>
            </td>
            <td th:text="${p.author}">홍길동</td>
            <td th:text="${p.modifiedDate}">2025-08-09</td>
        </tr>
        <tr th:if="${#lists.isEmpty(posts)}">
            <td colspan="4" class="text-center text-muted">게시글이 없습니다.</td>
        </tr>
        </tbody>
    </table>
</div>

<th:block th:replace="~{layout/footer :: common_footer}"></th:block>
</body>
</html>
