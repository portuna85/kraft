<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout">
<div th:fragment="content">
  <h2 th:text="${post.title}">제목</h2>
  <p><strong th:text="${post.authorName}">작성자</strong> | <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
  <div th:text="${post.content}">내용</div>

  <section>
    <h4>댓글</h4>
    <div th:each="comment : ${comments}" class="comment">
      <p><strong th:text="${comment.authorNickname}">작성자</strong> <span th:text="${comment.content}">내용</span></p>
    </div>

    <form method="post" th:action="@{/api/comments}">
      <input type="hidden" name="postId" th:value="${post.id}"/>
      <textarea name="content" placeholder="댓글을 입력하세요"></textarea>
      <button type="submit">등록</button>
    </form>
  </section>
</div>
</html>
