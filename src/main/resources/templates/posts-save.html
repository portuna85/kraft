<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{layout/header :: common_header}"></th:block>
<body>
<div class="container mt-4">
    <h2>글 등록</h2>
    <div class="form-group">
        <label>제목</label>
        <input id="title" class="form-control" type="text" placeholder="제목 입력"/>
    </div>
    <div class="form-group">
        <label>작성자</label>
        <input id="author" class="form-control" type="text" placeholder="작성자"/>
    </div>
    <div class="form-group">
        <label>내용</label>
        <textarea id="content" class="form-control" rows="6" placeholder="내용 입력"></textarea>
    </div>
    <button id="btn-save" class="btn btn-primary">등록</button>
    <a th:href="@{/}" class="btn btn-outline-secondary">취소</a>
</div>
<th:block th:replace="~{layout/footer :: common_footer}"></th:block>
</body>
</html>
