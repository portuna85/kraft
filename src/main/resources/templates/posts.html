<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: layout">
<div th:fragment="content">
  <h2>게시글 목록</h2>
  <table>
    <thead>
      <tr><th>#</th><th>제목</th><th>작성자</th><th>날짜</th><th>조회</th></tr>
    </thead>
    <tbody>
      <tr th:each="post : ${posts}">
        <td th:text="${post.id}">1</td>
        <td><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">제목</a></td>
        <td th:text="${post.authorName}">작성자</td>
        <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}">날짜</td>
        <td th:text="${post.viewCount}">0</td>
      </tr>
    </tbody>
  </table>
</div>
</html>
