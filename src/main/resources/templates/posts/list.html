<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::content})}">
    <th:block th:fragment="title">게시글 목록</th:block>

    <th:block th:fragment="content">
        <h1>게시글 목록</h1>

        <form method="get" th:action="@{/posts}" style="margin:12px 0">
            <input type="text" name="q" th:value="${q}" placeholder="검색어">
            <button class="btn btn-sm">검색</button>
            <a class="btn btn-primary btn-sm right" th:href="@{/posts/new}">새 글</a>
            <div style="clear:both"></div>
        </form>

        <ul class="list">
            <li th:each="p : ${page.content}">
                <a th:href="@{|/posts/${p.id}|}" th:text="${p.title}">제목</a>
                <div class="meta">
                    <span th:text="${#temporals.format(p.createdAt,'yyyy-MM-dd HH:mm')}">2025-01-01</span>
                    · <span th:text="${p.author != null ? p.author.username : '익명'}">작성자</span>
                </div>
            </li>
            <li th:if="${#lists.isEmpty(page.content)}">게시글이 없습니다.</li>
        </ul>

        <nav style="margin-top:12px">
            <a class="btn btn-sm" th:if="${page.hasPrevious()}"
               th:href="@{/posts(page=${page.number - 1}, q=${q})}">이전</a>
            <span th:text="${page.number + 1} + ' / ' + ${page.totalPages}"></span>
            <a class="btn btn-sm" th:if="${page.hasNext()}"
               th:href="@{/posts(page=${page.number + 1}, q=${q})}">다음</a>
        </nav>
    </th:block>
</th:block>
</html>
