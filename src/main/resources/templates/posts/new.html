<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section}, ~{::head}, ~{::script})}">
    <title>새 글</title>
    <head></head>

    <section>
        <div class="mx-auto" style="max-width:720px;">
            <h3 class="mb-4">새 글</h3>

            <form th:action="@{/posts}" method="post" th:object="${form}" class="needs-validation" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">제목</label>
                    <input th:field="*{title}" class="form-control" required maxlength="200">
                    <div class="text-danger small" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">e</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">내용</label>
                    <textarea th:field="*{content}" rows="8" class="form-control" required></textarea>
                    <div class="text-danger small" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">e
                    </div>
                </div>

                <button class="btn btn-primary" type="submit">등록</button>
            </form>
        </div>
    </section>

    <script>/* 폼 검증 스크립트 동일 */</script>
</th:block>
</html>
