<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section}, ~{::head}, ~{::script})}">
    <title>Sign Up</title>
    <head></head>

    <section>
        <div class="mx-auto" style="max-width:520px;">
            <h3 class="mb-4">회원가입</h3>

            <form th:action="@{/signup}" method="post" th:object="${form}" class="needs-validation" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="mb-3">
                    <label class="form-label">아이디</label>
                    <input th:field="*{username}" class="form-control" required maxlength="30">
                    <div class="invalid-feedback">아이디를 입력하세요.</div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('username')}" th:errors="*{username}">e
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">비밀번호</label>
                    <input th:field="*{password}" type="password" class="form-control" required minlength="8"
                           maxlength="64">
                    <div class="invalid-feedback">8자 이상 입력하세요.</div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}">e
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">닉네임</label>
                    <input th:field="*{nickname}" class="form-control" required maxlength="30">
                    <div class="invalid-feedback">닉네임을 입력하세요.</div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('nickname')}" th:errors="*{nickname}">e
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">이메일</label>
                    <input th:field="*{email}" type="email" class="form-control" required>
                    <div class="invalid-feedback">이메일 형식을 확인하세요.</div>
                    <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">e</div>
                </div>

                <button class="btn btn-primary w-100" type="submit">가입하기</button>
            </form>
        </div>
    </section>

    <script>
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            forms.forEach(f => f.addEventListener('submit', e => {
                if (!f.checkValidity()) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                f.classList.add('was-validated');
            }));
        })();
    </script>
</th:block>
</html>
