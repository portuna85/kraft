<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
            crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main class="container py-5" style="max-width:520px;">
    <h3 class="mb-4">Sign Up</h3>
    <form id="signup-form" class="needs-validation" novalidate>
        <div class="mb-3"><label class="form-label">아이디</label><input name="username" class="form-control" required>
            <div class="invalid-feedback">아이디를 입력하세요.</div>
        </div>
        <div class="mb-3"><label class="form-label">비밀번호</label><input name="password" type="password"
                                                                       class="form-control" required>
            <div class="invalid-feedback">비밀번호를 입력하세요.</div>
        </div>
        <div class="mb-3"><label class="form-label">닉네임</label><input name="nickname" class="form-control" required>
            <div class="invalid-feedback">닉네임을 입력하세요.</div>
        </div>
        <div class="mb-3"><label class="form-label">이메일</label><input name="email" type="email" class="form-control"
                                                                      required>
            <div class="invalid-feedback">이메일을 입력하세요.</div>
        </div>
        <button class="btn btn-success w-100" type="button" onclick="signup()">회원가입</button>
    </form>
    <script>
        async function signup() {
            const form = document.getElementById('signup-form');
            const body = Object.fromEntries(new FormData(form).entries());
            const res = await fetch('/api/users/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body)
            });
            alert('결과: ' + (await res.text()));
        }
    </script>

    <script>
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', e => {
                    if (!form.checkValidity()) {
                        e.preventDefault();
                        e.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>

</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
