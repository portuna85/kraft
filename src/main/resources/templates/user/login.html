<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 | Kraft</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<body>
<div th:replace="~{fragments/header :: header}"></div>


<div class="container mt-5">
    <h2 class="mb-4">로그인</h2>
    <form th:action="@{/login}" method="post" class="card p-4 bg-white shadow-sm rounded">
        <div class="mb-3">
            <label for="email" class="form-label">이메일</label>
            <input type="email" class="form-control" id="email" name="username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div th:if="${param.error}" class="alert alert-danger mt-2">
            이메일 또는 비밀번호가 올바르지 않습니다.
        </div>
        <button type="submit" class="btn btn-primary w-100">로그인</button>
    </form>
    <div class="mt-3 text-center">
        <a href="/join">회원가입 하러 가기</a>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>


</body>
</html>
