<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
</head>
<body>

<h1>로그인</h1>

<!-- 로그인 성공 후 메시지 (회원가입 성공 후 리디렉션시 표시) -->
<div th:if="${param.success}">
    <p>회원가입이 완료되었습니다. 로그인 해주세요.</p>
</div>

<!-- 로그인 실패 메시지 -->
<div th:if="${param.error}">
    <p style="color: red;">아이디 또는 비밀번호가 올바르지 않습니다.</p>
</div>

<form th:action="@{/login}" method="post">
    <div>
        <label>이메일</label>
        <input type="text" name="username" placeholder="이메일 입력" required />
    </div>
    <div>
        <label>비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호 입력" required />
    </div>
    <button type="submit">로그인</button>
</form>

<p>계정이 없으신가요? <a th:href="@{/join}">회원가입</a></p>

</body>
</html>
